kind = "web"
previewPath = "/"
title = "Social Media Admin Forms"
version = "1.0.0"
id = "artifacts/admin-forms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23521

[services.development]
run = "pnpm --filter @workspace/admin-forms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin-forms", "run", "build" ]
publicDir = "artifacts/admin-forms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23521"
BASE_PATH = "/"
